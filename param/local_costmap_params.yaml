# ==============================================================================
# Base configuration modified from TurtleBot3 Navigation Package
# Tailored and Tuned for Connectwo Robot
# ==============================================================================
local_costmap:
  global_frame: odom
  robot_base_frame: base_footprint

  update_frequency: 10.0
  publish_frequency: 10.0
  transform_tolerance: 0.55  

  static_map: false  
  rolling_window: true
  width: 3
  height: 3
  resolution: 0.1

  plugins:
    - {name: obstacle_layer,      type: "costmap_2d::ObstacleLayer"}
    - {name: inflation_layer,     type: "costmap_2d::InflationLayer"}